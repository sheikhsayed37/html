<!DOCTYPE html>
<html>
<head>
    <title>Enhanced Table Example</title>
</head>
<body>

<h2>Table with List, Image, Link, Rowspan & Colspan</h2>

<table border="1" bgcolor="lightgreen" width="80%" cellpadding="5" cellspacing="2">
    <tr>
        <th>List</th>
        <th>Image</th>
        <th>Link</th>
    </tr>
    <tr>
        <td rowspan="2">
            <ul type="circle">
                <li><i>Item 1</i></li>
                <li>Item 2</li>
                <li>Item 3</li>
            </ul>
        </td>
        <td align="center">
            <img src="sayed.jpg" height="50" width="50" alt="Sample Image">
        </td>
        <td>
            <a href="https://www.google.com" >Go to Google</a>
        </td>
    </tr>
    <tr>
        <td align="center">
            <img src="sayed.jpg" height="50" width="50" alt="Sample Image 2">
        </td>
        <td>
            <a href="https://www.wikipedia.org">Go to Wikipedia</a>
        </td>
    </tr>
    <tr>
        <td colspan="3" align="center"><b>This is a footer spanning all columns</b></td>
    </tr>
     
</table>

</body>
</html>
