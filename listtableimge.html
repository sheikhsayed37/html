<!DOCTYPE html>
<html>
<head>
    <title>Simple Table Example</title>
</head>
<body>

<h2>Simple Table with List, Image, and Link</h2>

<table border="1" bgcolor="green">
    <tr>
        <th>List</th>
        <th>Image</th>
        <th>Link</th>
    </tr>
    <tr>
        <td>
            <ul>
                <li><i>Item 1</i></li>
                <li>Item 2</li>
                <li>Item 3</li>
            </ul>
        </td>
        <td align="center">
            <img src="sayed.jpg" height="20" width="20" Image">
        </td>
        <td>
            <a href="https://www.google.com" target="_blank">Go to Google</a>
        </td>
    </tr>
</table>

</body>
</html>
